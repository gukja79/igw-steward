<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0088cc">
    <title>푸른회계 - 예결산 확인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        .department-name {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
        }

        .back-btn {
            padding: 8px 16px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #d0d0d0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .budget-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .budget-item.self {
            border-left-color: #4caf50;
        }

        .category-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .budget-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .budget-label {
            font-size: 13px;
            color: #666;
            min-width: 40px;
        }

        .budget-amount {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
            white-space: nowrap;
        }

        .self-summary {
            background: linear-gradient(135deg, #4caf5015 0%, #4caf5025 100%);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .self-summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #4caf50;
            margin-bottom: 15px;
        }

        .self-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .self-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 2px solid #4caf5050;
        }

        .self-label {
            font-weight: 600;
            color: #333;
        }

        .self-amount {
            font-size: 18px;
            font-weight: 700;
            color: #4caf50;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            display: none;
        }

        .empty-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 예결산 확인</h1>
                <div class="department-name" id="departmentDisplay"></div>
            </div>
            <button class="back-btn" onclick="goBack()">← 입력 화면</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>데이터 조회 중...</p>
        </div>

        <div class="empty-message" id="emptyMessage">
            <p>📭</p>
            <p style="margin-top: 10px;">예결산 데이터가 없습니다</p>
        </div>

        <div id="budgetContent" style="display: none;">
            <div class="section-title">지원금</div>
            <div id="supportBudgets"></div>

            <div class="self-summary">
                <div class="self-summary-title">자부담</div>
                <div class="self-row">
                    <span class="self-label">수입</span>
                    <span class="self-amount" id="selfIncome">0원</span>
                </div>
                <div class="self-row">
                    <span class="self-label">지출</span>
                    <span class="self-amount" id="selfExpense">0원</span>
                </div>
                <div class="self-row">
                    <span class="self-label">잔액</span>
                    <span class="self-amount" id="selfBalance">0원</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzh4QlzdWAy6ofKmrf8aGEqLAvQtC-qt86QQV-l1nyww37qpJDTLlTvFdXaNwUy5-64lQ/exec';

        const urlParams = new URLSearchParams(window.location.search);
        const department = urlParams.get('department');

        if (department) {
            document.getElementById('departmentDisplay').textContent = department;
            loadBudget(department);
        } else {
            document.getElementById('departmentDisplay').textContent = '부서를 선택해주세요';
            document.getElementById('emptyMessage').classList.add('show');
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function loadBudget(department) {
            const loading = document.getElementById('loading');
            const budgetContent = document.getElementById('budgetContent');
            const emptyMessage = document.getElementById('emptyMessage');
            
            loading.classList.add('show');
            budgetContent.style.display = 'none';
            emptyMessage.classList.remove('show');
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getBudget&department=${encodeURIComponent(department)}`);
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    emptyMessage.classList.add('show');
                    return;
                }
                
                if (data.budgetData && data.budgetData.length > 0) {
                    displayBudget(data.budgetData, data.selfTotals);
                    budgetContent.style.display = 'block';
                } else {
                    emptyMessage.classList.add('show');
                }
            } catch (error) {
                alert('데이터 조회 중 오류가 발생했습니다: ' + error.message);
                emptyMessage.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }

        function displayBudget(budgetData, selfTotals) {
            const supportBudgets = document.getElementById('supportBudgets');
            supportBudgets.innerHTML = '';
            
            budgetData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'budget-item';
                div.innerHTML = `
                    <div class="category-name">${item.category}</div>
                    <div class="budget-row">
                        <div style="display: flex; gap: 5px;">
                            <span class="budget-label">예산</span>
                            <span class="budget-amount">${item.budget.toLocaleString('ko-KR')}원</span>
                        </div>
                        <div style="display: flex; gap: 5px;">
                            <span class="budget-label">지출</span>
                            <span class="budget-amount">${item.expense.toLocaleString('ko-KR')}원</span>
                        </div>
                        <div style="display: flex; gap: 5px;">
                            <span class="budget-label">잔액</span>
                            <span class="budget-amount">${item.balance.toLocaleString('ko-KR')}원</span>
                        </div>
                    </div>
                `;
                supportBudgets.appendChild(div);
            });
            
            // 자부담 합계
            document.getElementById('selfIncome').textContent = selfTotals.income.toLocaleString('ko-KR') + '원';
            document.getElementById('selfExpense').textContent = selfTotals.expense.toLocaleString('ko-KR') + '원';
            document.getElementById('selfBalance').textContent = selfTotals.balance.toLocaleString('ko-KR') + '원';
            
            // 반응형 폰트 크기 조절
            adjustBudgetAmountsFontSize();
        }

        function adjustBudgetAmountsFontSize() {
            setTimeout(() => {
                const allAmounts = document.querySelectorAll('.budget-amount, .self-amount');
                if (allAmounts.length === 0) return;
                
                let maxWidth = 0;
                
                // 초기 크기로 최대 너비 측정
                allAmounts.forEach(span => {
                    span.style.fontSize = '16px';
                    if (span.offsetWidth > maxWidth) {
                        maxWidth = span.offsetWidth;
                    }
                });
                
                // 화면 너비의 30% 기준
                const screenWidth = document.querySelector('.container').offsetWidth;
                const maxAllowedWidth = screenWidth * 0.3;
                
                // 너비에 따라 폰트 크기 조정
                let fontSize = 16;
                if (maxWidth > maxAllowedWidth * 0.9) {
                    fontSize = 14;
                }
                if (maxWidth > maxAllowedWidth) {
                    fontSize = 12;
                }
                if (maxWidth > maxAllowedWidth * 1.2) {
                    fontSize = 11;
                }
                
                // 모든 금액에 같은 크기 적용
                allAmounts.forEach(span => {
                    span.style.fontSize = fontSize + 'px';
                });
                
                // self-amount는 조금 더 크게
                document.querySelectorAll('.self-amount').forEach(span => {
                    span.style.fontSize = (fontSize + 2) + 'px';
                });
            }, 50);
        }
    </script>
</body>
</html>
